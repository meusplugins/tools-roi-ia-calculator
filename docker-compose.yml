version: "3.8"

services:
  app:
    image: nuzzlabs1/tools-roi-ia-calculator:latest
    networks:
      - NetNuzz
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.roi-calculator.rule=Host(`calculadora.nuzz.com.br`)"
        - "traefik.http.routers.roi-calculator.entrypoints=websecure"
        - "traefik.http.routers.roi-calculator.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.roi-calculator.loadbalancer.server.port=80"

networks:
  NetNuzz:
    external: true
    name: NetNuzz
